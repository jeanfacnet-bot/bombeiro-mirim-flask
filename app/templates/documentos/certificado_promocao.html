<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Certificado de Promoção</title>

<style>
body {
    margin: 0;
    padding: 0;
}

.container-certificado {
    position: relative;
    width: 1096px;
    height: 746px;
}

/* DATA */
.data {
    position: absolute;
    left: 474px;
    top: 443px;
    width: 535px;
    text-align: right;
    font-size: 18px;
}

/* TEXTO PRINCIPAL */
.texto {
    position: absolute;
    left: 70px;
    top: 298px;
    width: 975px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 25px;
    text-align: left;
}

/* INSÍGNIA */
.insignia {
    position: absolute;
    left: 73px;
    top: 412px;
}

/* ASSINATURA */
.assinatura {
    position: absolute;
    left: 42px;
    top: 554px;
    width: 990px;
    text-align: center;
}
</style>
</head>

<body onload="window.print()">

<div class="container-certificado">

    <!-- FUNDO -->
    <img src="{{ url_for('static', filename='images/fundo/fundocertificado2024.png') }}"
         width="1096" height="746">

    <!-- DATA -->
    <div class="data">
        Brasília, DF em {{ data_extenso }}
    </div>

    <!-- TEXTO -->
    <div class="texto">
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        A Assessoria de Programas Sociais do Corpo de Bombeiros Militar do Distrito Federal
        concede ao bombeiro mirim
        <span style="text-transform:uppercase; font-size: 26px; color: #F00;">
            <strong>{{ ficha.nome }}</strong>
        </span>
        a graduação de
        <span style="text-transform:uppercase; font-size: 26px;">
            {{ ficha.graduacao }}
        </span>.
    </div>

    <!-- INSÍGNIA DINÂMICA -->
    <div class="insignia">
        <img src="{{ url_for('static', filename='images/' + ficha.graduacao + '.png') }}"
             height="150">
    </div>

    <!-- ASSINATURA -->
    <div class="assinatura">
        <img src="{{ url_for('static', filename='images/assinaturas/brazlandia.png') }}"
             width="1008" height="150">
    </div>

</div>

</body>
</html>
