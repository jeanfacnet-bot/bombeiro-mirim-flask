<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Certificado participação</title>

<style>
body {
    margin: 0;
    padding: 0;
}

.container-certificado {
    position: relative;
    width: 1096px;
    height: 746px;
}

.data {
    position: absolute;
    top: 513px;
    right: 100px;
    font-size: 18px;
}

.texto {
    position: absolute;
    left: 75px;
    top: 358px;
    width: 949px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 25px;
    text-align: justify;
    color: #000;
}
</style>
</head>

<body onload="window.print()">

<div class="container-certificado">

    <!-- FUNDO -->
    <img src="{{ url_for('static', filename='images/fundo/fundocertificado.png') }}"
         width="1096" height="746">

    <!-- DATA -->
    <div class="data">
        Brasília, DF em {{ data_extenso }}
    </div>

    <!-- TEXTO -->
    <div class="texto">
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        A Assessoria dos Programas Sociais do Corpo de Bombeiros Militar do Distrito Federal certifica que o aluno
        <span style="text-transform:uppercase; font-size: 26px;">
            <strong style="color:#C00">{{ ficha.nome }}</strong>
        </span>,
        participou do Programa Bombeiro Mirim,
        no período de {{ ano_inicio }} à {{ ano_fim }}.
    </div>

</div>

</body>
</html>
