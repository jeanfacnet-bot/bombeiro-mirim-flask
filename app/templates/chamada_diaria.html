<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chamada Diária - Bombeiro Mirim</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: rgb(192, 217, 241);
        }

        .table-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            padding: 20px;
            margin-top: 20px;
        }

        .user-info span {
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container-fluid py-4" style="width: 80%; margin: 0 auto;">

    <div class="text-center mb-4">
        <h2 class="text-primary">Chamada Diária</h2>
        <div class="user-info mb-3">
            <span class="badge bg-primary me-2">Usuário: {{ usuario.usuario }}</span>
            <span class="badge bg-secondary">OBM: {{ usuario.obm }}</span>
        </div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" id="chamadaForm">

		<div class="row mb-3">
			<div class="col-md-6">
				<select name="turno" class="form-select" required>
					<option value="">Selecione o Turno</option>
					<option value="MATUTINO">MATUTINO</option>
					<option value="VESPERTINO">VESPERTINO</option>
				</select>
			</div>

			<div class="col-md-6">
				<select name="pelotao" class="form-select" required>
					<option value="">Selecione o Pelotão</option>
					<option value="1">1º Pelotão (7-9 anos)</option>
					<option value="2">2º Pelotão (10-11 anos)</option>
					<option value="3">3º Pelotão (12-14 anos)</option>
				</select>
			</div>
		</div>

		<!-- 🔥 AQUI FICA SÓ A LISTA -->
		<div id="listaAlunos" class="table-container">
			<!-- AJAX injeta aqui -->
		</div>

		<!-- 🔥 BOTÕES FICAM FORA DA DIV -->
		<div class="text-center mt-3">
			<button type="submit" class="btn btn-primary">
				Finalizar Chamada
			</button>

			<button type="button" class="btn btn-secondary" onclick="history.back()">
				Voltar
			</button>

			<button type="button" class="btn btn-danger" onclick="window.close()">
				Fechar
			</button>
		</div>

	</form>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function(){

    $('select[name="turno"], select[name="pelotao"]').change(function(){

        let turno = $('select[name="turno"]').val();
        let pelotao = $('select[name="pelotao"]').val();

        if(turno && pelotao){

            $.ajax({
				url: "/buscar_alunos_chamada",
				method: "POST",
				data: { turno: turno, pelotao: pelotao },
				success: function(response){

					$("#listaAlunos").empty();
					$("#listaAlunos").append(response);

				}
			});

        }
    });

});

</script>

</body>
</html>
